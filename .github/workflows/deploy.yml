name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to djtom98.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          # Use a personal access token (PAT) with repo scope, stored as secret PAGES_TOKEN
          personal_token: ${{ secrets.PAGES_TOKEN }}
          external_repository: djtom98/djtom98.github.io
          publish_branch: main
          publish_dir: ./out
          commit_message: "deploy: ${{ github.event.head_commit.message }}"
